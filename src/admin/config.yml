backend:
  name: github
  repo: thegrandheavybold/tghb_studio
  branch: main

media_folder: "src/assets/img"
public_folder: "/assets/img"

locale: "en"
publish_mode: simple
i18n:
  structure: multiple_folders
  locales: [en, de]
  default_locale: en

collections:
  - name: "nevernotcooking"
    label: "NeverNotCooking"
    folder: "src/nevernotcooking"
    path: "items/{{slug}}"
    create: true
    i18n: true
    extension: "md"
    format: "frontmatter"
    identifier_field: "title"
    summary: "{{title}} ({{locale}})"
    slug: "nnc-{{fields.slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string", i18n: true }
      - { label: "Slug", name: "slug", widget: "string", hint: "URL slug without / and ideally without punctuation, e.g. pray-for-me", i18n: duplicate }
      - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", time_format: false, date_format: "YYYY-MM-DD", i18n: duplicate }
      - label: "Description"
        name: "description"
        widget: "markdown"
        required: false
        i18n: true
        buttons: ["bold", "italic", "link", "quote"]
        editor_components: []
      - label: "Filters"
        name: "filters"
        widget: "select"
        multiple: true
        i18n: duplicate
        options:
          - { label: "AI", value: "ai" }
          - { label: "Apparel", value: "apparel" }
          - { label: "Art", value: "art" }
          - { label: "Corporate", value: "corporate" }
          - { label: "Editorial", value: "editorial" }
          - { label: "Gfx", value: "gfx" }
          - { label: "Illustration", value: "illustration" }
          - { label: "Interior", value: "interior" }
          - { label: "Motion", value: "motion" }
          - { label: "Murals", value: "murals" }
          - { label: "Objects", value: "objects" }
          - { label: "Photography", value: "photography" }
          - { label: "Product", value: "product" }
          - { label: "Typography", value: "typography" }
          - { label: "UI/UX", value: "uiux" }
      - label: "Hashtags"
        name: "hashtags"
        widget: "list"
        required: false
        allow_add: true
        collapsed: false
        i18n: duplicate
        field: { label: "Tag", widget: "string" }
      - label: "Media"
        name: "media"
        widget: "list"
        i18n: duplicate
        summary: "{{fields.type}} {{fields.src}}{{fields.full}}"
        types:
          - label: "Image"
            name: "image"
            widget: "object"
            summary: "{{fields.type}} {{fields.src}}"
            fields:
              - { label: "Type", name: "type", widget: "hidden", default: "image" }
              - label: "Image Source"
                name: "src"
                widget: "image"
                required: true
                i18n: duplicate
                media_folder: "/src/assets/img/upload"
                public_folder: "/assets/img/upload"
                hint: "Upload to src/assets/img/upload or choose an existing image from src/assets/img"
              - { label: "Alt Text", name: "alt", widget: "string", required: false, i18n: true }
          - label: "Video"
            name: "video"
            widget: "object"
            summary: "{{fields.type}} {{fields.full}}{{fields.preview}}"
            fields:
              - { label: "Type", name: "type", widget: "hidden", default: "video" }
              - label: "Video Preview"
                name: "preview"
                widget: "file"
                required: false
                i18n: duplicate
                media_folder: "/src/assets/video/upload"
                public_folder: "/assets/video/upload"
                hint: "Upload to src/assets/video/upload or choose an existing preview video (optional)"
              - label: "Video Full"
                name: "full"
                widget: "file"
                required: false
                i18n: duplicate
                media_folder: "/src/assets/video/upload"
                public_folder: "/assets/video/upload"
                hint: "Upload to src/assets/video/upload or choose an existing full video (optional)"
              - label: "Video Poster"
                name: "poster"
                widget: "image"
                required: false
                i18n: duplicate
                media_folder: "/src/assets/img/upload"
                public_folder: "/assets/img/upload"
                hint: "Upload to src/assets/img/upload or choose an existing poster image (optional)"
              - { label: "Alt Text", name: "alt", widget: "string", required: false, i18n: true }
